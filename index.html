<!DOCTYPE html>
<html lang='uk'>
<head>
    <meta charset='UTF-8'>
    <title>Подарунок для Маші</title>
    <style>
        body {
            background: #0a0a0a;
            color: #ff4081;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
        }
        .card {
            text-align: center;
            padding: 40px;
            border: 3px solid #ff4081;
            border-radius: 25px;
            box-shadow: 0 0 40px #ff4081;
            background: rgba(15,15,15,0.95);
            z-index: 10;
        }
        .gifts {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
        }
        .box {
            width: 120px;
            height: 120px;
            border: 2px dashed #ff4081;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.4s;
            font-size: 3em;
        }
        .box:hover {
            transform: scale(1.1) rotate(5deg);
            background: rgba(255,64,129,0.15);
        }
        .box.open {
            background: #ff4081;
            border-style: solid;
            font-size: 1.1rem;
            color: #fff;
        }
        .h {
            position: absolute;
            color: #ff4081;
            top: -20px;
            animation: fall linear infinite;
            z-index: 1;
        }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>
    <audio id='m' loop>
        <source src='https://www.mboxdrive.com/happy-birthday-to-you-jazz.mp3' type='audio/mpeg'>
    </audio>

    <div class='card'>
        <h1>🎉 З Днем Народження, Маша! 🎉</h1>
        <div class='gifts'>
            <div class='box' onclick="document.getElementById('m').play();this.innerHTML='Гарфілд 🍿';this.classList.add('open');">🎁</div>
            <div class='box' onclick="document.getElementById('m').play();this.innerHTML='Брелок 💐';this.classList.add('open');">🎁</div>
            <div class='box' onclick="document.getElementById('m').play();this.innerHTML='Торт ✨';this.classList.add('open');">🎁</div>
        </div>
    </div>

    <script>
        // Функція для створення падаючих сердечок
        function addH() {
            const d = document.createElement('div');
            d.className = 'h';
            d.innerHTML = '❤️';
            d.style.left = Math.random() * 100 + 'vw';
            d.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 5000);
        }
        setInterval(addH, 250);
    </script>
</body>
</html>
